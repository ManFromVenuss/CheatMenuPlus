name: Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 9.0.x

      - name: Restore private reference assemblies
        shell: pwsh
        env:
          LARGE_SECRET_PASSPHRASE: ${{ secrets.LARGE_SECRET_PASSPHRASE }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:LARGE_SECRET_PASSPHRASE)) {
            Write-Error "Missing LARGE_SECRET_PASSPHRASE. Add the passphrase used to encrypt references.zip.gpg as a repository secret."
          }

          $zipPath = Join-Path $env:RUNNER_TEMP "mycopunk-references.zip"
          gpg --quiet --batch --yes --decrypt --passphrase="$env:LARGE_SECRET_PASSPHRASE" --output $zipPath references.zip.gpg
          Expand-Archive -Path $zipPath -DestinationPath "${{ github.workspace }}\references" -Force

      - name: Build
        run: >
          dotnet build .\CSPROJECT.csproj
          -c Release
          /p:GameManagedPath="${{ github.workspace }}\references\Managed"
          /p:BepInExCorePath="${{ github.workspace }}\references\BepInExCore"

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: CheatMenuPlus
          path: |
            bin/Release/net48/CheatMenu.dll
            README.md
            CHANGELOG.md
            LICENSE
            thunderstore.toml
