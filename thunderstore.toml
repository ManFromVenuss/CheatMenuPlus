[config]
schemaVersion = "0.0.1"

[package]
namespace = "ManFromVenuss"
name = "CheatMenuPlus"
description = "CheatMenu+ is a fork/continuation of Sparroh's CheatMenu, based on Slidedrum's MenuMod2, with extra cheats, custom upgrade pickups, and cosmetic editing."
websiteUrl = "https://github.com/ManFromVenuss/CheatMenuPlus"
containsNsfwContent = false

[package.dependencies]
BepInEx-BepInExPack_Mycopunk = "5.4.2403"

[build]
icon = "icon.png"
readme = "README.md"
outdir = "build"

[[build.copy]]
source = "bin/Release/net48/CheatMenu.dll"
target = "BepInEx/plugins/CheatMenu.dll"

[[build.copy]]
source = "CHANGELOG.md"
target = "CHANGELOG.md"

[[build.copy]]
source = "LICENSE"
target = "LICENSE"

[publish]
repository = "https://thunderstore.io"
communities = [ "mycopunk" ]

[publish.categories]
mycopunk = [ "client" ]
